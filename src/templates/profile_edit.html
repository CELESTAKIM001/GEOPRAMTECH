{% extends "base.html" %}
{% load static %}

{% block title %}Edit Profile - GEOPRAM{% endblock %}

{% block content %}
<div class="login-page">
    <div class="login-container">
        <div class="login-card glass-card">
            <div class="login-header">
                <div class="logo-icon"><i class="fas fa-cog"></i></div>
                <h2>Edit Profile</h2>
                <p>Update your details</p>
            </div>

            {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                <li class="{{ message.tags }}">{{ message }}</li>
                {% endfor %}
            </ul>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label>Bio</label>
                    <textarea name="bio" rows="3" placeholder="Tell us about yourself...">{{ profile.bio|default:"" }}</textarea>
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" name="phone" value="{{ profile.phone|default:"" }}" placeholder="+254...">
                </div>
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" name="location" value="{{ profile.location|default:"" }}" placeholder="City, Country">
                </div>
                <div class="form-group">
                    <label>Company</label>
                    <input type="text" name="company" value="{{ profile.company|default:"" }}" placeholder="Company name">
                </div>
                <div class="form-group">
                    <label>Website</label>
                    <input type="url" name="website" value="{{ profile.website|default:"" }}" placeholder="https://...">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Update Profile</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
