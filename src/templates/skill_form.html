{% extends "base.html" %}
{% load static %}

{% block title %}Add Skill - GEOPRAM{% endblock %}

{% block content %}
<div class="login-page">
    <div class="login-container">
        <div class="login-card glass-card">
            <div class="login-header">
                <div class="logo-icon"><i class="fas fa-bolt"></i></div>
                <h2>Add New Skill</h2>
                <p>Showcase your expertise</p>
            </div>

            {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                <li class="{{ message.tags }}">{{ message }}</li>
                {% endfor %}
            </ul>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label>Skill Name</label>
                    <input type="text" name="name" placeholder="e.g., Python, GIS, Web Development" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select name="category">
                        <option value="technical">Technical</option>
                        <option value="programming">Programming</option>
                        <option value="gis">GIS</option>
                        <option value="design">Design</option>
                        <option value="data">Data Analysis</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea name="description" rows="3" placeholder="Describe your skill..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Add Skill</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
